<!DOCTYPE html>
<html>
<head>
  <title>JSON Gamify Tool</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="json-gamify.css">
</head>
<body>
  <div id="container">
    <div id="header">
      <h1>Spell Item Type Tagger</h1>
      <div id="scores">
        <span>Score: <span id="score">0</span></span>
        <span>High Score: <span id="high-score">0</span></span>
      </div>
    </div>
    <div id="progress-bar-container">
      <div id="progress-bar"></div>
    </div>
    <div id="main-content">
      <div id="details-container">
        <h2 id="item-title">Loading...</h2>
        <div id="item-details"></div>
      </div>
      <div id="dynamic-ui-container">
        <!-- Form fields will be dynamically inserted here -->
      </div>
    </div>
    <div id="footer">
      <button id="undo-button">Undo</button>
      <button id="next-button">Next</button>
    </div>
  </div>
  <script src="json-gamify.js"></script>
</body>
</html>
