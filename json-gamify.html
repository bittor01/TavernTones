<!DOCTYPE html>
<html>
<head>
  <title>JSON Gamify Tool</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="json-gamify.css">
</head>
<body>
  <div id="container">
    <div id="header">
      <h1>Spell Item Type Tagger</h1>
      <div id="scores">
        <span>Score: <span id="score">0</span></span>
        <span>High Score: <span id="high-score">0</span></span>
        <div id="eta-container">
            <span>File ETA: <span id="eta-file">--</span></span>
            <span>Task ETA: <span id="eta-task">--</span></span>
        </div>
      </div>
    </div>
    <label for="progress-bar">File Progress:</label>
    <div id="progress-bar-container" class="progress-bar-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <label for="overall-progress-bar">Overall Task Progress:</label>
    <div id="overall-progress-bar-container" class="progress-bar-container">
        <div id="overall-progress-bar" class="progress-bar"></div>
    </div>
    <div id="main-content">
      <div id="details-container">
        <h2 id="item-title">Loading...</h2>
        <div id="item-details"></div>
      </div>
      <div id="dynamic-ui-container">
        <!-- Form fields will be dynamically inserted here -->
      </div>
    </div>
    <div id="footer">
      <button id="load-task-button">Load Task</button>
      <div class="footer-right">
        <button id="undo-button">Undo</button>
        <button id="scrap-button">Scrap</button>
        <button id="next-button">Next</button>
      </div>
    </div>
  </div>
  <script src="json-gamify.js"></script>
</body>
</html>
