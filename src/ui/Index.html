<!-- Performance and security update -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TavernTones</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="main-grid">
    <!-- -------------------- LEFT COLUMN -------------------- -->
    <div class="column column-left">
      <div id="creature-entry-container" class="box">
        <form id="add-creature-form">
          <h2>Add Combatant <button id="import-from-file-btn" class="small-btn" title="Import from File">⬇️</button></h2>
          <div class="form-row">
            <div class="form-group name-group">
              <label>Combatant:</label>
              <input type="text" id="creature-name" required>
              <span id="imported-monster-info-btn" class="info-btn" style="display: none;">ℹ️</span>
            </div>
            <div id="mob-controls" class="form-group" style="display: none; align-items: center;">
              <label>Count:</label>
              <input type="number" id="mob-size" min="1" value="5" style="width: 60px;">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Initiative:</label><input type="text" id="creature-initiative"
                placeholder="+3 or 15"></div>
            <div class="form-group"><label>HP:</label><input type="text" id="creature-hp" placeholder="2d8+2"></div>
            <div class="form-group"><label>AC:</label><input type="number" id="creature-ac" placeholder="15"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Speed:</label><input type="text" id="creature-speed" placeholder="30ft"></div>
            <div class="form-group"><label>Atk Mod:</label><input type="text" id="attack-modifier" placeholder="+5"></div>
            <div class="form-group"><label>Save DC:</label><input type="number" id="save-dc" placeholder="13"></div>
          </div>
          <hr>
          <div class="stats-grid">
            <div class="grid-header"></div>
            <div class="grid-header">STR</div>
            <div class="grid-header">DEX</div>
            <div class="grid-header">CON</div>
            <div class="grid-header">INT</div>
            <div class="grid-header">WIS</div>
            <div class="grid-header">CHA</div>
            <div class="grid-label">Score</div>
            <input type="number" id="str-score" placeholder="12"><input type="number" id="dex-score" placeholder="12"><input
              type="number" id="con-score" placeholder="12"><input type="number" id="int-score" placeholder="12"><input
              type="number" id="wis-score" placeholder="12"><input type="number" id="cha-score" placeholder="12">
            <div class="grid-label">Save</div>
            <input type="text" id="str-save" placeholder="+1"><input type="text" id="dex-save" placeholder="+1"><input
              type="text" id="con-save" placeholder="+1"><input type="text" id="int-save" placeholder="+1"><input
              type="text" id="wis-save" placeholder="+1"><input type="text" id="cha-save" placeholder="+1">
          </div>
          <div class="form-actions">
            <button type="button" id="convert-to-mob-btn">Convert to Mob</button>
            <button type="button" id="import-monster-btn">Import Combatant</button>
            <button type="submit" class="add-creature-button">Add Combatant</button>
            <button type="button" id="clear-form-btn">Clear</button>
          </div>
        </form>
      </div>
      <div id="log-wrapper" class="box">
        <div class="panel-header">
          <h2 id="log-title">Log</h2>
          <div class="panel-header-controls">
            <button id="push-panel-btn" class="small-btn" title="Push to Chat" style="display: none;">🖨️</button>
            <button id="log-toggle-btn" class="small-btn" title="Toggle Panel">🔃</button>
          </div>
        </div>
        <div class="log-area" id="logArea"></div>
        <div class="log-area" id="diceLog" style="display: none;"></div>
        <div class="log-area" id="statBlockArea" style="display: none;"></div>
      </div>
      <div id="music-controls-container" class="box">
        <div class="panel-header">
          <h2>Music</h2>
          <div class="panel-header-controls">
            <button id="music-clear-btn" class="small-btn" title="Clear Stack">🗑️</button>
          </div>
        </div>
        <div class="music-stack-list" id="music-stack-list"></div>
        <div class="controls">
          <button id="music-prev-btn" title="Previous">⏮️</button>
          <button id="music-play-btn">▶️ Play</button>
          <button id="music-next-btn" title="Next">⏭️</button>
          <button id="music-loop-btn" title="Loop Mode">🔁</button>
          <button id="music-shuffle-btn" title="Shuffle">🔀</button>
        </div>
        <div class="controls">
          <button id="music-add-file-btn">➕ Files</button>
          <button id="music-add-folder-btn">➕ Folder</button>
          <button id="music-preview-btn">👁️ Preview</button>
        </div>
        <div class="fileLabel">
          <span>Now Playing:</span>
          <span id="music-now-playing" class="active-track-name">None</span>
        </div>
      </div>
    </div>

    <!-- -------------------- MIDDLE COLUMN -------------------- -->
    <div class="column column-middle">
      <div id="turn-controls-container" class="box">
        <div class="panel-header">
          <h2>Controls</h2>
          <div class="panel-header-controls">
            <button id="settings-button" class="small-btn" title="Settings">⚙️</button>
            <button id="reset-encounter-mid" class="small-btn" title="Reset Encounter">⏪</button>
            <button id="clear-encounter-mid" class="small-btn" title="Clear Encounter">🗑️</button>
          </div>
        </div>
        <div class="controls">
          <button id="previous-turn-button">Prev Turn</button>
          <button id="next-turn-button">Next Turn</button>
        </div>
        <div class="controls">
          <button id="save-button">Save Encounter</button>
          <button id="load-button">Load Encounter</button>
        </div>
      </div>
      <div id="initiative-list-container" class="box">
        <div class="panel-header">
          <h2>Initiative Order</h2>
          <div class="panel-header-controls">
            <button id="push-initiative-btn" class="small-btn" title="Push to Chat">💬</button>
          </div>
        </div>
        <div id="initiative-list">
          <!-- Simple initiative list will be rendered here -->
        </div>
      </div>
      <div id="soundboard-container" class="box">
        <div class="panel-header">
          <h2>Soundboard</h2>
          <div class="panel-header-controls">
            <div class="row-selectors" style="display: inline-flex; gap: 2px; margin-right: 10px;">
              <button class="small-btn row-select-btn" data-rows="1">3</button>
              <button class="small-btn row-select-btn" data-rows="2">6</button>
              <button class="small-btn row-select-btn active" data-rows="3">9</button>
            </div>
            <button id="save-preset-btn" class="small-btn" title="Save Preset">💾</button>
            <button id="load-preset-btn" class="small-btn" title="Load Preset">📂</button>
            <label for="soundboard-volume" style="font-size: 0.8em; margin-left: 5px;">Vol:</label>
            <input type="range" id="soundboard-volume" min="0" max="1" step="0.05" value="0.5">
          </div>
        </div>
        <div id="soundboard-grid">
          <!-- 3x3 grid of soundboard controls will be rendered here -->
        </div>
      </div>
    </div>

    <!-- -------------------- RIGHT COLUMN -------------------- -->
    <div class="column column-right box">
      <div class="panel-header">
        <h2>Combatants</h2>
        <div class="panel-header-controls">
          <button id="reset-encounter-right" class="small-btn" title="Reset Encounter">⏪</button>
          <button id="clear-encounter-right" class="small-btn" title="Clear Encounter">🗑️</button>
        </div>
      </div>
      <div id="combatant-details-list">
        <!-- Full interactive list of all combatants rendered here -->
      </div>
    </div>
  </div>
  <audio id="preview-audio-player" style="display: none;"></audio>

  <dialog id="emoji-picker-dialog">
    <form method="dialog">
      <h3>Select Emoji</h3>
      <input type="text" id="emoji-input" maxlength="2" placeholder="📢"
        style="font-size: 2em; width: 50px; text-align: center;">
      <div class="dialog-controls">
        <button value="cancel">Cancel</button>
        <button id="confirm-emoji-btn" value="default">Confirm</button>
      </div>
    </form>
  </dialog>

  <dialog id="import-selection-dialog">
    <form method="dialog">
      <h3>Select Combatants to Import</h3>
      <div class="dialog-toolbar" style="margin-bottom: 5px;">
        <button id="import-select-all" type="button" class="small-btn">Select All</button>
        <button id="import-clear-all" type="button" class="small-btn">Clear All</button>
      </div>
      <div id="import-list-container" style="max-height: 300px; overflow-y: auto; margin-bottom: 10px;">
        <!-- Checkboxes will be added here -->
      </div>
      <div class="dialog-actions">
        <button value="cancel">Cancel</button>
        <button id="confirm-import-btn" value="confirm">Import</button>
      </div>
    </form>
  </dialog>

  <div id="global-tooltip"></div>
  <script src="renderer.js"></script>
</body>

</html>
