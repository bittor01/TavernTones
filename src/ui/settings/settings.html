<!-- Performance and security update -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
        }
        .settings-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
            font-size: 0.9em;
        }
        .path-input-group {
            display: flex;
            align-items: center;
        }
        .path-input-group input {
            flex-grow: 1;
            margin-right: 5px;
        }
        #setup-default-folders {
            width: 100%;
            padding: 10px;
            background-color: #ffc107;
            border-color: #e0a800;
            color: #212529;
            font-weight: bold;
        }
        #save-button {
            width: 100%;
            padding: 12px;
            background-color: #3c3c3c;
            border-color: #555;
            font-size: 1.1em;
            font-weight: bold;
        }
        #save-button.dirty {
            background-color: #28a745;
            border-color: #218838;
        }
        .slash-commands-row {
            display: flex;
            gap: 10px;
        }
        .slash-commands-row button {
            flex: 1;
        }
        h2 {
            font-size: 1.2em;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="settings-container box">
        <div class="settings-grid">
            <!-- Left Column: Discord -->
            <div class="settings-column">
                <div class="panel-header">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <h2>Discord Bot</h2>
                        <span id="bot-status-indicator" class="status-indicator" title="Bot Status: Unknown">🟥</span>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <label style="display: flex; align-items: center; font-size: 0.9em; cursor: pointer;">
                                <input type="checkbox" id="enableDiscordBot" style="margin-right: 5px; width: auto;"> Enable Bot
                            </label>
                            <button id="walkthrough-btn" class="small-btn" title="Setup Guide" style="font-size: 1em; padding: 2px 6px;">📖 Guide</button>
                        </div>
                        <label style="display: flex; align-items: center; font-size: 0.9em; cursor: pointer;">
                            <input type="checkbox" id="audioModeToggle" style="margin-right: 5px; width: auto;"> Audio-Only Layout
                        </label>
                    </div>
                </div>
                <div id="discord-fields">
                    <div class="form-group">
                        <label for="token">Bot Token</label>
                        <input type="password" id="token" placeholder="Enter your Discord bot token">
                    </div>
                    <div class="form-group">
                        <label for="voiceChannel">Voice Channel ID</label>
                        <input type="text" id="voiceChannel" placeholder="Voice Channel ID">
                    </div>
                    <div class="form-group">
                        <label for="textChannel">Text Channel ID</label>
                        <input type="text" id="textChannel" placeholder="Text Channel ID">
                    </div>
                    <div class="form-group">
                        <label for="botRoleId">Bot Role ID</label>
                        <input type="text" id="botRoleId" placeholder="Enter the role ID for the bot">
                    </div>
                </div>

                <hr>
                <h2>Discord Slash Commands</h2>
                <div class="slash-commands-row">
                    <button id="register-slash-btn">Register</button>
                    <button id="unregister-slash-btn">Unregister</button>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Interaction Instructions</label>
                    <div style="background: #1e1e1e; border: 1px solid #444; padding: 10px; border-radius: 4px; font-size: 0.85em; color: #aaa; line-height: 1.4;">
                        <strong>Slash Commands:</strong> Type <code>/</code> in Discord (e.g. <code>/roll</code>).<br>
                        <strong>Text Commands:</strong> You must <strong>@mention</strong> the bot (e.g. <code>@TavernTones !pl chill</code>).
                    </div>
                </div>
            </div>

            <!-- Right Column: Paths & Dependencies -->
            <div class="settings-column">
                <h2>External Dependencies</h2>
                <div class="form-group">
                    <label for="ffmpegPath">FFmpeg Binaries Folder</label>
                    <div class="path-input-group">
                        <input type="text" id="ffmpegPath" placeholder="Folder containing ffmpeg and ffprobe">
                        <button id="browse-ffmpeg">Browse</button>
                    </div>
                </div>

                <hr>
                <h2>Data Paths</h2>
                <div class="form-group">
                    <label for="defaultMusicPath">Default Music Path</label>
                    <div class="path-input-group">
                        <input type="text" id="defaultMusicPath" placeholder="Path to default music folder" readonly>
                        <button id="browse-music">Browse</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="randomTablesPath">Random Tables Path</label>
                    <div class="path-input-group">
                        <input type="text" id="randomTablesPath" placeholder="Path to random tables" readonly>
                        <button id="browse-random-tables">Browse</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="bestiaryPath">Bestiary Data Path</label>
                    <div class="path-input-group">
                        <input type="text" id="bestiaryPath" placeholder="Path to bestiary .json files" readonly>
                        <button id="browse-bestiary">Browse</button>
                    </div>
                </div>

                <button id="setup-default-folders">Setup Default Folders</button>

                <hr>
                <div class="form-group">
                    <label for="gitRepoUrl">Bestiary Source (Git Repo)</label>
                    <input type="text" id="gitRepoUrl" placeholder="https://github.com/.../5etools-src">
                </div>
                <div class="form-group">
                    <label for="githubToken">GitHub Token (Optional)</label>
                    <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <button id="fetch-bestiary-btn" style="width: 100%;">Fetch/Update Bestiary</button>

            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button id="help-button" style="width: 100px;">Help</button>
            <button id="license-button" style="width: 100px;">Licenses</button>
            <button id="save-button" style="flex-grow: 1;">Save and Close</button>
        </div>
    </div>

    <dialog id="license-dialog" style="width: 60%; max-height: 80%;">
        <h3>Package Licenses</h3>
        <div id="license-content" style="overflow-y: auto; max-height: 50vh;">
            <table style="width: 100%; border-collapse: collapse; font-size: 0.9em;">
                <thead>
                    <tr style="border-bottom: 1px solid #444; text-align: left;">
                        <th style="padding: 8px;">Package</th>
                        <th style="padding: 8px;">Version</th>
                        <th style="padding: 8px;">License</th>
                    </tr>
                </thead>
                <tbody id="license-table-body">
                    <!-- Rows will be added here -->
                </tbody>
            </table>
        </div>
        <div style="text-align: right; margin-top: 20px;">
            <button onclick="document.getElementById('license-dialog').close()">Close</button>
        </div>
    </dialog>

    <dialog id="license-text-dialog" style="width: 70%; max-height: 80%;">
        <h3 id="license-text-title">License Text</h3>
        <pre id="license-text-content" style="white-space: pre-wrap; background: #1e1e1e; padding: 15px; border-radius: 4px; max-height: 50vh; overflow-y: auto; font-family: monospace; font-size: 0.85em; color: #ccc;"></pre>
        <div style="text-align: right; margin-top: 20px;">
            <button onclick="document.getElementById('license-text-dialog').close()">Back</button>
        </div>
    </dialog>

    <dialog id="help-dialog" style="width: 80%; max-height: 80%;">
        <div id="help-content" style="overflow-y: auto; max-height: 60vh; line-height: 1.6;">
            <!-- Help content will be loaded here -->
        </div>
        <div style="text-align: right; margin-top: 20px;">
            <button onclick="document.getElementById('help-dialog').close()">Close</button>
        </div>
    </dialog>

    <script src="settings.js"></script>
</body>
</html>
