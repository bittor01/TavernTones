<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        /* Add some specific styles for the settings page */
        body {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .settings-container {
            width: 100%;
            max-width: 500px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
        }
        .folder-select {
            display: flex;
            gap: 10px;
        }
        .folder-select input {
            flex-grow: 1;
        }
        #save-button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="settings-container box">
        <h2>Discord Bot Settings</h2>
        <div class="form-group">
            <label for="token">Bot Token</label>
            <input type="password" id="token" placeholder="Enter your Discord bot token">
        </div>
        <div class="form-group">
            <label for="voiceChannel">Voice Channel ID</label>
            <input type="text" id="voiceChannel" placeholder="Enter the voice channel ID">
        </div>
        <div class="form-group">
            <label for="textChannel">Text Channel ID</label>
            <input type="text" id="textChannel" placeholder="Enter the text channel ID">
        </div>
        <div class="form-group">
            <label for="botRoleId">Bot Role ID</label>
            <input type="text" id="botRoleId" placeholder="Enter the role ID for the bot">
        </div>
        <div class="form-group">
            <label for="defaultLocalFolder">Default Music Folder</label>
            <div class="folder-select">
                <input type="text" id="defaultLocalFolder" placeholder="Select a folder..." readonly>
                <button id="browse-folder-button">Browse...</button>
            </div>
        </div>
        <button id="save-button">Save and Restart</button>
    </div>
    <script src="settings.js"></script>
</body>
</html>
