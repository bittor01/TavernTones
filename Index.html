<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TavernTones</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="main-grid">
    <!-- -------------------- LEFT COLUMN -------------------- -->
    <div class="column column-left">
      <div id="creature-entry-container" class="box">
        <h2>Add Creature</h2>
        <form id="add-creature-form">
          <!-- Form fields will be added here via JS or next step -->
        </form>
      </div>
      <div id="log-container" class="box">
        <h2>Log</h2>
        <div class="log-area" id="logArea"></div>
      </div>
      <div id="dice-log-container" class="box">
        <h2>Dice Log</h2>
        <div class="log-area" id="diceLog"></div>
      </div>
      <div id="music-controls-container" class="box">
        <h2>Music</h2>
        <div class="controls">
          <button id="playPauseButton" disabled>Play</button>
          <button id="selectFileButton">Select File</button>
        </div>
        <div class="fileLabel">
          <span id="selectedFileLabel">No file selected</span>
        </div>
      </div>
    </div>

    <!-- -------------------- MIDDLE COLUMN -------------------- -->
    <div class="column column-middle">
      <div id="turn-controls-container" class="box">
          <div class="panel-header">
            <h2>Controls</h2>
            <div class="panel-header-controls">
                <button id="reset-encounter-mid" class="small-btn" title="Reset Encounter">🔄</button>
                <button id="clear-encounter-mid" class="small-btn" title="Clear Encounter">🗑️</button>
            </div>
          </div>
          <div class="controls">
            <button id="previous-turn-button">Prev Turn</button>
            <button id="next-turn-button">Next Turn</button>
          </div>
          <div class="controls">
            <button id="save-button">Save Encounter</button>
            <button id="load-button">Load Encounter</button>
          </div>
      </div>
      <div id="initiative-list-container" class="box">
        <h2>Initiative Order</h2>
        <div id="initiative-list">
          <!-- Simple initiative list will be rendered here -->
        </div>
      </div>
    </div>

    <!-- -------------------- RIGHT COLUMN -------------------- -->
    <div class="column column-right box">
      <div class="panel-header">
        <h2>Combatants</h2>
        <div class="panel-header-controls">
            <button id="reset-encounter-right" class="small-btn" title="Reset Encounter">🔄</button>
            <button id="clear-encounter-right" class="small-btn" title="Clear Encounter">🗑️</button>
        </div>
      </div>
      <div id="combatant-details-list">
        <!-- Full interactive list of all combatants rendered here -->
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
