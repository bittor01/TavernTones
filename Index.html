<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TavernTones</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="controls">
      <button id="exitButton">Exit</button>
      <button id="playPauseButton" disabled>Play</button>
      <button id="selectFileButton">Select File</button>
      <button id="initiativeTrackerButton">Initiative Tracker</button>
      <button id="hpTrackerButton">HP Tracker</button>
    </div>
    <div class="logArea" id="logArea"></div>
  </div>
  <div class="dice-log-container">
    <h2>Dice Log</h2>
    <div id="diceLog" class="dice-log"></div>
  </div>
  <div class="fileLabel">
    <span id="selectedFileLabel">No file selected</span>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
